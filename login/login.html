  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main>
    <section>
      <!-- Icono de carrito pequeño encima del formulario -->
      <div class="logo-contenido">
        <img src="../img/logoCarritoShopEasy.png" alt="Logo carrito ShopEasy"/>
      </div>

      <h2 id="titulo-login">Iniciar sesión</h2>
      <p>Ingresa con tu cuenta ShopEasy para continuar.</p>

      <form action="../home.html" method="get" novalidate>
        <!-- Tipo de usuario -->
        <fieldset>
          <legend>Ingresar como</legend>
          <label>
            <input type="radio" name="rol" value="comprador" checked/>Comprador
          </label>
          <label>
            <input type="radio" name="rol" value="vendedor"/>Vendedor
          </label>
          <label>
            <input type="radio" name="rol" value="administrador"/>Administrador
          </label>
        </fieldset>

        <!-- Correo -->
        <div>
          <label for="email">Correo electrónico <abbr title="campo obligatorio">*</abbr>
          </label>
          <input type="email" id="email" name="email" placeholder="tu@correo.com" autocomplete="email" required/>
        </div>

        <!-- Contraseña -->
        <div>
          <label for="password">Contraseña <abbr title="campo obligatorio">*</abbr>
          </label>
          <input type="password" id="password" name="password" placeholder="Tu contraseña"
            autocomplete="current-password" required/>
        </div>

        <!-- Recordar sesión -->
        <div>
          <label>
            <input type="checkbox" name="recordar" value="si"/>Mantener sesión iniciada
          </label>
        </div>

        <!-- Botones -->
        <div>
          <button type="submit">Iniciar sesión</button>
          <button type="reset">Limpiar</button>
        </div>
      </form>

      <hr/>

      <div>
        <p>¿Olvidaste tu contraseña?</a></p>
        <p>¿No tienes cuenta? <a href="../registro/registro.html">Regístrate gratis</a></p>
      </div>
    </section>
  </main>
